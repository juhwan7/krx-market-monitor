name: Market Telegram Bot

on:
  schedule:
    - cron: '*/30 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4  # 👈 v3에서 v4로 변경

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5  # 👈 v4에서 v5로 변경
      with:
        python-version: '3.10'

    - name: 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 파이썬 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python bot.py
