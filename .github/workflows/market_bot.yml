name: Market Telegram Bot

on:
  push:
    branches: [ "main", "master" ]  # 💡 코드를 전송(Commit)하면 즉시 실행!
  schedule:
    - cron: '*/30 0-6 * * 1-5'      # 평일 30분마다 실행
  workflow_dispatch:                # 수동 버튼 실행

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 yfinance pandas lxml

    - name: 파이썬 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        HANWHA_APP_KEY: ${{ secrets.HANWHA_APP_KEY }}
        HANWHA_APP_SECRET: ${{ secrets.HANWHA_APP_SECRET }}
      run: python bot.py